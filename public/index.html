<!DOCTYPE html>
<html>
<head>
<title>WhatsApp Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

input {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
}

img {
    margin-top: 20px;
}
</style>
</head>

<body>

<h2>📱 WhatsApp Bot Dashboard</h2>

<p id="status">Connecting...</p>

<img id="qr" width="200">

<h3>Send Message</h3>

<input type="text" id="number" placeholder="255XXXXXXXXX">
<br>
<input type="text" id="message" placeholder="Message">
<br>

<button onclick="send()">Send</button>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

// RECEIVE QR
socket.on("qr", (data) => {
    document.getElementById("qr").src = data;
});

// STATUS
socket.on("status", (msg) => {
    document.getElementById("status").innerText = msg;
});

// SEND MESSAGE
function send(){
    let number = document.getElementById("number").value;
    let message = document.getElementById("message").value;

    socket.emit("sendMessage", {
        number: number,
        message: message
    });
}
</script>

</body>
</html>
