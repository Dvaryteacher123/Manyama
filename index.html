<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY CONNECT - WhatsApp Style</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        /* RANGI NA MAUA YA WHATSAPP */
        :root { 
            --wa-green: #075E54; 
            --wa-teal: #128C7E; 
            --wa-light-green: #25D366;
            --wa-bg: #E5DDD5; /* Rangi ya background ya chat */
            --wa-white: #FFFFFF;
            --wa-bubble-sent: #DCF8C6;
            --wa-bubble-rcvd: #FFFFFF;
        }

        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; margin: 0; background-color: var(--wa-bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER YA JUU */
        header { background-color: var(--wa-green); color: white; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .wa-logo { width: 35px; height: 35px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--wa-green); font-weight: bold; font-size: 20px; }
        header h1 { margin: 0; font-size: 20px; font-weight: 500; }
        .header-icons { display: flex; gap: 15px; font-size: 20px; cursor: pointer; }

        /* AREA KUU YA MAUDHUI */
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* CHAT SIDEBAR (KUSHOTO) */
        #sidebar { width: 30%; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .search-bar { padding: 10px; background: #f6f6f6; border-bottom: 1px solid #ddd; }
        .search-bar input { width: 100%; padding: 8px; border-radius: 20px; border: none; background: white; box-sizing: border-box; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .chat-item:hover { background-color: #f5f5f5; }
        .chat-item .avatar { width: 45px; height: 45px; background: #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; }
        .chat-item-info { flex: 1; }
        .chat-item-info h4 { margin: 0; font-size: 16px; font-weight: 500; }
        .chat-item-info p { margin: 0; font-size: 13px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* CHAT WINDOW (KATI) */
        #chat-window { flex: 1; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/1500684/157742790-2da6a60e-862d-4581-99a3-5c0102604e38.png'); background-repeat: repeat; position: relative; }
        #chat-header { background: #f6f6f6; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ddd; }
        #chat-header .user-info { display: flex; align-items: center; gap: 10px; }
        #chat-header h3 { margin: 0; font-size: 16px; font-weight: 500; }
        #chat-header p { margin: 0; font-size: 12px; color: var(--wa-teal); }
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* BUBBLES ZA CHAT */
        .bubble { padding: 8px 12px; border-radius: 8px; max-width: 70%; position: relative; font-size: 14px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background-color: var(--wa-bubble-sent); align-self: flex-end; border-top-right-radius: 0; }
        .received { background-color: var(--wa-bubble-rcvd); align-self: flex-start; border-top-left-radius: 0; }
        .bubble .time { font-size: 10px; color: #999; position: absolute; bottom: 2px; right: 5px; }

        /* INPUT BAR (CHINI) */
        #input-bar { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        #input-bar input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: white; outline: none; }
        #send-btn { background: var(--wa-teal); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }

        /* VIDEO CALL OVERLAY */
        #video-overlay { position: fixed; inset: 0; background: black; z-index: 100; display: none; flex-direction: column; }
        #video-header { background: rgba(0,0,0,0.5); color: white; padding: 10px; display: flex; justify-content: space-between; position: absolute; top: 0; left: 0; right: 0; z-index: 101; }
        #meet-container { flex: 1; width: 100%; height: 100%; }

        /* JOIN SETUP */
        #setup { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; justify-content: center; align-items: center; }
        .setup-box { background: white; padding: 30px; border-radius: 10px; text-align: center; width: 90%; max-width: 350px; }
        .setup-box input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .setup-box button { width: 100%; padding: 10px; background: var(--wa-light-green); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup">
        <div class="setup-box">
            <div class="wa-logo" style="margin: 0 auto 15px; width: 60px; height: 60px; font-size: 30px; background: var(--wa-green); color: white;">D</div>
            <h3 style="margin-top:0;">Dvary Connect</h3>
            <p style="font-size:14px; color:#666; margin-bottom:20px;">Weka jina la Group au Room ili kujiunga kitalaamu.</p>
            <input type="text" id="user-name" placeholder="Jina lako (mfano: Mwalimu Elia)">
            <input type="text" id="room-name" placeholder="Jina la Room (mfano: City_Ujasusi)">
            <button onclick="startDvaryConnect()">JIUNGE NA GROUP</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <div class="wa-logo">D</div>
            <h1>Dvary Connect</h1>
        </div>
        <div class="header-icons">
            <span>🔍</span>
            <span>⋮</span>
        </div>
    </header>

    <div class="main-container">
        <div id="sidebar">
            <div class="search-bar">
                <input type="text" placeholder="Tafuta au anza chat mpya">
            </div>
            <div id="chat-list">
                <div class="chat-item" onclick="loadChat('Mwalimu Elia', 'E')">
                    <div class="avatar" style="background:#075E54">E</div>
                    <div class="chat-item-info">
                        <h4>Mwalimu Elia (Wewe)</h4>
                        <p>Dvary Jrjoined</p>
                    </div>
                </div>
                <div class="chat-item" onclick="loadChat('Dvary Support', 'S')">
                    <div class="avatar" style="background:#128C7E">S</div>
                    <div class="chat-item-info">
                        <h4>Dvary Support</h4>
                        <p>Je, unahitaji msaada wa kurekodi mechi?</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="chat-window">
            <div id="chat-header">
                <div class="user-info">
                    <div id="active-avatar" class="avatar" style="width:40px; height:40px; background:#ccc; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">?</div>
                    <div>
                        <h3 id="active-user-name">Chagua Chat</h3>
                        <p id="active-user-status">online</p>
                    </div>
                </div>
                <div class="header-icons" style="color: var(--wa-teal);">
                    <span onclick="startVideoCall()">📞</span> <span>📎</span>
                    <span>⋮</span>
                </div>
            </div>

            <div id="chat-messages">
                <div class="bubble received">Karibu kwenye ujasusi wa Dvary Connect! <span class="time">10:00 AM</span></div>
            </div>

            <div id="input-bar">
                <span>😊</span>
                <input type="text" id="chat-input" placeholder="Andika ujumbe...">
                <button id="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <div id="video-overlay">
        <div id="video-header">
            <h3 id="video-room-name" style="margin:0;">Video Call</h3>
            <button onclick="endVideoCall()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">End Call</button>
        </div>
        <div id="meet-container"></div>
    </div>

    <script>
        let api = null;
        let myName = "";
        let myRoom = "";

        // Hali ya mwanzo: Ficha chat window mpaka chumba kichaguliwe
        document.getElementById('chat-window').style.display = 'none';

        function startDvaryConnect() {
            myName = document.getElementById('user-name').value;
            myRoom = document.getElementById('room-name').value;
            
            if (!myName || !myRoom) return alert("Weka Jina lako na Jina la Room!");
            
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            
            // Weka jina la chumba kwenye sidebar
            document.querySelector('#chat-list .chat-item-info p').innerText = "Group: " + myRoom;
            loadChat(myName + " (Group)", "D");
        }

        function loadChat(userName, initial) {
            document.getElementById('active-user-name').innerText = userName;
            const avatar = document.getElementById('active-avatar');
            avatar.innerText = initial;
            avatar.style.background = (initial === 'E') ? '#075E54' : '#128C7E';
            
            // Reset messages
            const display = document.getElementById('chat-messages');
            display.innerHTML = '<div class="bubble received">Umeingia kwenye chumba: ' + myRoom + '. Sasa mnaweza kuchat na kupigiana simu. <span class="time">Sasa</span></div>';
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;

            const display = document.getElementById('chat-messages');
            const now = new Date();
            const timeStr = now.getHours() + ':' + (now.getMinutes()<10?'0':'') + now.getMinutes() + (now.getHours() >= 12 ? ' PM' : ' AM');

            const newMsg = document.createElement('div');
            newMsg.className = 'bubble sent';
            newMsg.innerHTML = input.value + '<span class="time">' + timeStr + '</span>';
            display.appendChild(newMsg);
            
            // Scroll to bottom
            display.scrollTop = display.scrollHeight;
            input.value = '';
        }

        // --- VIDEO CALL FUNCTIONS (Kama WhatsApp) ---

        function startVideoCall() {
            if (!myRoom) return;
            
            document.getElementById('video-overlay').style.display = 'flex';
            document.getElementById('video-room-name').innerText = "Video: " + myRoom;
            
            // Jitsi Meet API
            const domain = 'meet.jit.si';
            const options = {
                roomName: 'Dvary_' + myRoom, // Jina la siri la chumba
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-container'),
                userInfo: { displayName: myName }, // Jina lako litakaloonekana
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false
                },
                interfaceConfigOverwrite: {
                    // TOOLBAR kama ya WhatsApp
                    TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup', 'tileview', 'chat', 'raisehand'],
                    DEFAULT_BACKGROUND: '#075E54',
                    SHOW_JITSI_WATERMARK: false,
                    JITSI_WATERMARK_LINK: ''
                }
            };
            api = new JitsiMeetExternalAPI(domain, options);
            
            // Ikikata simu kivyake
            api.addEventListener('videoConferenceLeft', () => {
                endVideoCall();
            });
        }

        function endVideoCall() {
            if(api) {
                api.dispose(); // Zima kamera na mic
                api = null;
            }
            document.getElementById('video-overlay').style.display = 'none';
        }

        // allow 'Enter' to send message
        document.getElementById("chat-input").addEventListener("keypress", function(event) {
          if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
          }
        });

    </script>
</body>
</html>
