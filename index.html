<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY BUILDER | MULTI-LANGUAGE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --dark: #202124; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        
        /* Sidebar Controls */
        .sidebar { width: 420px; background: #fff; padding: 25px; border-right: 1px solid #ddd; overflow-y: auto; position: relative; }
        
        /* Language Switcher Style */
        .lang-bar { position: absolute; top: 20px; right: 20px; display: flex; gap: 5px; }
        .lang-btn { padding: 5px 10px; font-size: 10px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; background: #fff; font-weight: bold; }
        .lang-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .sidebar h2 { color: var(--primary); font-size: 22px; margin-top: 10px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; font-size: 13px; color: #555; margin-bottom: 8px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 160px; background: #282c34; color: #abb2bf; font-family: 'Consolas', monospace; }

        .btn-build { width: 100%; padding: 16px; background: #188038; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Preview Area */
        .preview { flex: 1; display: flex; align-items: center; justify-content: center; background: #e0e4e8; }
        .phone { width: 290px; height: 580px; background: #fff; border: 10px solid var(--dark); border-radius: 35px; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .phone-header { height: 55px; display: flex; align-items: center; padding: 0 15px; color: white; font-weight: bold; }
        .phone-screen { flex: 1; border: none; width: 100%; background: #fff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="lang-bar">
            <div class="lang-btn active" id="btn-sw" onclick="setLang('sw')">SW</div>
            <div class="lang-btn" id="btn-en" onclick="setLang('en')">EN</div>
        </div>

        <h2 id="txt-title">Dvary Builder</h2>
        <p id="txt-subtitle" style="font-size: 11px; color: #888; margin-bottom: 25px;">Tengeneza App yako kitalaamu.</p>

        <div class="form-group">
            <label id="lbl-name">JINA LA APP:</label>
            <input type="text" id="appName" placeholder="Dvary App" oninput="updatePreview()">
        </div>

        <div class="form-group">
            <label id="lbl-color">RANGI YA APP:</label>
            <input type="color" id="appColor" value="#1a73e8" oninput="updatePreview()">
        </div>

        <div class="form-group">
            <label id="lbl-code">KODI ZA HTML (SECTIONS):</label>
            <textarea id="appHtml" placeholder="<div>Maandishi yako hapa...</div>" oninput="updatePreview()"></textarea>
        </div>

        <button class="btn-build" onclick="downloadApp()" id="btn-text">
            <i class="fas fa-download"></i> PAKUA APP (DOWNLOAD)
        </button>
    </div>

    <div class="preview">
        <div class="phone">
            <div id="pHeader" class="phone-header" style="background: #1a73e8;">Dvary App</div>
            <iframe id="pScreen" class="phone-screen"></iframe>
        </div>
    </div>

    <script>
        // DATA YA LUGHA
        const translations = {
            sw: {
                title: "Dvary Builder",
                subtitle: "Tengeneza App yako kitalaamu.",
                lbl_name: "JINA LA APP:",
                lbl_color: "RANGI YA APP:",
                lbl_code: "KODI ZA HTML (SECTIONS):",
                btn_text: "PAKUA APP (DOWNLOAD)",
                placeholder_code: "<div>Weka kodi yako hapa...</div>"
            },
            en: {
                title: "Dvary Builder",
                subtitle: "Build your professional App.",
                lbl_name: "APP NAME:",
                lbl_color: "THEME COLOR:",
                lbl_code: "HTML CODES (SECTIONS):",
                btn_text: "DOWNLOAD APP",
                placeholder_code: "<div>Put your code here...</div>"
            }
        };

        let currentLang = 'sw';

        function setLang(lang) {
            currentLang = lang;
            // Update Buttons
            document.getElementById('btn-sw').classList.toggle('active', lang === 'sw');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // Update UI Text
            document.getElementById('txt-title').innerText = translations[lang].title;
            document.getElementById('txt-subtitle').innerText = translations[lang].subtitle;
            document.getElementById('lbl-name').innerText = translations[lang].lbl_name;
            document.getElementById('lbl-color').innerText = translations[lang].lbl_color;
            document.getElementById('lbl-code').innerText = translations[lang].lbl_code;
            document.getElementById('btn-text').innerHTML = `<i class="fas fa-download"></i> ${translations[lang].btn_text}`;
            document.getElementById('appHtml').placeholder = translations[lang].placeholder_code;
        }

        function updatePreview() {
            const name = document.getElementById('appName').value || "Dvary App";
            const color = document.getElementById('appColor').value;
            const html = document.getElementById('appHtml').value || "<h2>Karibu!</h2><p>Mabadiliko yataonekana hapa.</p>";

            document.getElementById('pHeader').innerText = name;
            document.getElementById('pHeader').style.background = color;

            const frame = document.getElementById('pScreen');
            const doc = frame.contentDocument;
            doc.open();
            doc.write(`<style>body{font-family:sans-serif; padding:15px; color:#333;} img{max-width:100%;}</style>${html}`);
            doc.close();
        }

        function downloadApp() {
            const name = document.getElementById('appName').value || "Dvary_App";
            const color = document.getElementById('appColor').value;
            const html = document.getElementById('appHtml').value;

            const finalCode = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${name}</title><style>body{margin:0;font-family:sans-serif;}.h{background:${color};color:#fff;padding:20px;text-align:center;font-weight:bold;}.c{padding:20px;}</style></head><body><div class="h">${name.toUpperCase()}</div><div class="c">${html}</div></body></html>`;

            const blob = new Blob([finalCode], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name.replace(/\s+/g, '_') + ".html";
            a.click();
        }

        // Run on start
        updatePreview();
    </script>
</body>
</html>
