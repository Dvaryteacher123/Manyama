<!-- Sehemu ya QR Generator iliyoboreshwa -->
<section id="qrTab" class="section">
    <div class="card">
        <h3>🏁 DVARY QR GENERATOR</h3>
        <p>Tengeneza na Pakua QR Code yako:</p>
        <input type="text" id="qrText" placeholder="Weka Link au Namba hapa...">
        
        <div class="btn-group">
            <button class="btn-neon" onclick="generateMyQR()">GENERATE QR</button>
            <!-- Kitufe cha Download (Kimefichwa mpaka QR itengenezwe) -->
            <button id="downloadBtn" class="btn-red" style="display:none; margin-top:10px; background:#007bff;" onclick="downloadQR()">📥 DOWNLOAD QR CODE</button>
        </div>
        
        <div id="qrcode" style="margin-top: 20px; display: flex; justify-content: center; background: white; padding: 15px; border-radius: 10px; border: 2px solid var(--neon);"></div>
    </div>
</section>

<script>
    function generateMyQR() {
        const text = document.getElementById('qrText').value;
        const qrContainer = document.getElementById('qrcode');
        const dlBtn = document.getElementById('downloadBtn');
        
        if(!text) return alert("Weka Link kwanza mwalimu!");
        
        qrContainer.innerHTML = ""; // Safisha ya zamani
        
        new QRCode(qrContainer, {
            text: text,
            width: 200,
            height: 200
        });

        // Onyesha kitufe cha download baada ya sekunde 1 (ili QR iwe imekamilika)
        setTimeout(() => {
            dlBtn.style.display = 'block';
        }, 500);
    }

    function downloadQR() {
        const qrImg = document.querySelector('#qrcode img');
        if (!qrImg) return alert("Tengeneza QR kwanza!");

        const link = document.createElement('a');
        link.href = qrImg.src;
        link.download = 'Dvary_QR_Code.png'; // Jina la picha itakayopakuliwa
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
