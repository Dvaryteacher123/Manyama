<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVAR-CALC VAULT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --btn: #333; --accent: #ff9500; }
        body { background: #111; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* CALCULATOR DESIGN */
        .calc-box { width: 320px; background: var(--bg); padding: 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        #display { width: 100%; height: 80px; background: #000; border: none; color: #fff; text-align: right; font-size: 40px; margin-bottom: 20px; padding: 10px; box-sizing: border-box; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { height: 65px; border-radius: 50%; border: none; font-size: 24px; font-weight: bold; cursor: pointer; color: #fff; transition: 0.2s; }
        .btn-num { background: var(--btn); }
        .btn-op { background: var(--accent); }
        .btn-zero { grid-column: span 2; border-radius: 35px; }
        .btn:active { transform: scale(0.9); opacity: 0.8; }

        /* SECRET VAULT DESIGN (HIDDEN) */
        #vault { display: none; position: fixed; inset: 0; background: #fff; z-index: 1000; padding: 20px; overflow-y: auto; }
        .vault-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        video, img { width: 100%; border-radius: 10px; border: 1px solid #ddd; }
        .add-btn { background: var(--accent); color: #fff; padding: 15px; border: none; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="calc-box" id="calc-ui">
        <input type="text" id="display" placeholder="0" readonly>
        <div class="buttons">
            <button class="btn btn-num" onclick="clearCalc()" style="background:#a5a5a5; color:#000;">AC</button>
            <button class="btn btn-num" style="background:#a5a5a5; color:#000;">+/-</button>
            <button class="btn btn-num" style="background:#a5a5a5; color:#000;">%</button>
            <button class="btn btn-op">÷</button>
            
            <button class="btn btn-num" onclick="press('7')">7</button>
            <button class="btn btn-num" onclick="press('8')">8</button>
            <button class="btn btn-num" onclick="press('9')">9</button>
            <button class="btn btn-op">×</button>
            
            <button class="btn btn-num" onclick="press('4')">4</button>
            <button class="btn btn-num" onclick="press('5')">5</button>
            <button class="btn btn-num" onclick="press('6')">6</button>
            <button class="btn btn-op">−</button>
            
            <button class="btn btn-num" onclick="press('1')">1</button>
            <button class="btn btn-num" onclick="press('2')">2</button>
            <button class="btn btn-num" onclick="press('3')">3</button>
            <button class="btn btn-op">+</button>
            
            <button class="btn btn-num btn-zero" onclick="press('0')">0</button>
            <button class="btn btn-num">.</button>
            <button class="btn btn-op" onclick="checkPass()">=</button>
        </div>
    </div>

    <div id="vault">
        <div class="vault-header">
            <h2><i class="fas fa-shield-alt"></i> Dvary Vault</h2>
            <button onclick="lockVault()" style="background:red; color:#fff; border:none; padding:5px 10px; border-radius:5px;">LOCK</button>
        </div>
        
        <p style="font-size: 13px; color: #666;">Hifadhi Video na Picha zako za siri hapa.</p>
        
        <input type="file" id="media-input" accept="video/*,image/*" style="display:none;" onchange="saveMedia(event)">
        <button class="add-btn" onclick="document.getElementById('media-input').click()">+ ONGEZA VIDEO/PICHA</button>
        
        <div class="video-grid" id="gallery">
            </div>
    </div>

    <script>
        let secretPass = "2026"; // Hii ndio password yako ya siri!
        let currentInput = "";

        function press(num) {
            currentInput += num;
            document.getElementById('display').value = currentInput;
        }

        function clearCalc() {
            currentInput = "";
            document.getElementById('display').value = "0";
        }

        function checkPass() {
            if (currentInput === secretPass) {
                document.getElementById('calc-ui').style.display = 'none';
                document.getElementById('vault').style.display = 'block';
                loadSavedMedia();
            } else {
                // Kama sio password, basi fanya kama calculator ya kawaida (Hapa unaweza kuongeza Eval logic)
                alert("Jibu ni: " + currentInput);
                clearCalc();
            }
        }

        function lockVault() {
            document.getElementById('vault').style.display = 'none';
            document.getElementById('calc-ui').style.display = 'block';
            clearCalc();
        }

        // HAPA NDIPO TUNAHIFADHI KWELI (DATABASE YA SIMU - LocalStorage)
        function saveMedia(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const mediaData = e.target.result;
                let myVault = JSON.parse(localStorage.getItem('dvary_vault') || '[]');
                myVault.push({ type: file.type, data: mediaData });
                localStorage.setItem('dvary_vault', JSON.stringify(myVault));
                loadSavedMedia();
            };
            reader.readAsDataURL(file);
        }

        function loadSavedMedia() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = "";
            let myVault = JSON.parse(localStorage.getItem('dvary_vault') || '[]');
            
            myVault.forEach(item => {
                if (item.type.includes('video')) {
                    gallery.innerHTML += `<video src="${item.data}" controls></video>`;
                } else {
                    gallery.innerHTML += `<img src="${item.data}">`;
                }
            });
        }
    </script>
</body>
</html>
