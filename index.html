<script>

function showSection(id){

/* =========================

const content = {

en:{
btn:"SEND OFFICIAL APPEAL",
msg:`Dear WhatsApp Support Team,

I kindly request a review of my WhatsApp account [NUMBER].

This account is important for family communication and business activities.

If any violation happened unintentionally, I sincerely apologize. I promise to follow all WhatsApp rules in the future.

Please review my account and restore it as soon as possible.

Thank you.`
},

sw:{
btn:"TUMA MAOMBI RASMI",
msg:`Ndugu Timu ya WhatsApp,

Naomba mfanye mapitio ya akaunti yangu [NUMBER].

Namba hii ni muhimu kwa mawasiliano ya familia na biashara.

Kama kuna kosa limetokea bila kukusudia ninaomba radhi kwa dhati. Ninaahidi kufuata sheria zote za WhatsApp kuanzia sasa.

Naomba nirejeshewe akaunti yangu haraka iwezekanavyo.

function changeContent(){

}

let msg =
content[lang].msg.replace("[NUMBER]",number);

`https://mail.google.com/mail/?view=cm&fs=1&to=support@support.whatsapp.com&su=WhatsApp Account Support&body=${encodeURIComponent(msg)}`,

/* =========================
MOVIE SEARCH
========================= */

async function tafutaMovie(){

const movieName =
document.getElementById('movieInput').value;

const apiKey='A46b7201';

const url=
`https://www.omdbapi.com/?t=${encodeURIComponent(movieName)}&apikey=${apiKey}`;

const response =
await fetch(url);

const data =
await response.json();

if(data.Response==="True"){

document.getElementById("movieResult")
.style.display="block";

document.getElementById("moviePoster")
.src=data.Poster;

document.getElementById("movieTitle")
.innerText=data.Title;

document.getElementById("movieMeta")
.innerText=`${data.Year} | ${data.Runtime}`;

document.getElementById("moviePlot")
.innerText=data.Plot;

document.getElementById("watchLink")
.href=`https://vidsrc.to/embed/movie/${data.imdbID}`;

document.getElementById("downloadLink")
.href=`https://vidsrc.icu/embed/movie/${data.imdbID}`;

}else{

alert("Movie not found");

}

}

/* =========================
LINK PRO
========================= */

const CLOUD_NAME = "dvbftux6w";
const UPLOAD_PRESET = "dvary_preset";

async function uploadFile(){

const file =
document.getElementById("file-input").files[0];

if(!file){
alert("Choose File");
return;
}

const formData = new FormData();

formData.append("file",file);

formData.append("upload_preset",UPLOAD_PRESET);

document.getElementById("result-box")
.style.display="block";

document.getElementById("final-link")
.innerText="Uploading...";

const response =
await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,
{
method:"POST",
body:formData
}
);

const data =
await response.json();

document.getElementById("final-link")
.innerText=data.secure_url;

}

function generateLink(){

const text =
document.getElementById("text-input").value;

if(!text){
alert("Write Text");
return;
}

const encoded = btoa(text);

const final =
window.location.href.split("?")[0]
+ "?msg=" + encoded;

document.getElementById("result-box")
.style.display="block";

document.getElementById("final-link")
.innerText=final;

}

function copyLink(){

navigator.clipboard.writeText(
document.getElementById("final-link").innerText
);

alert("Copied");

}

window.onload = ()=>{

const params =
new URLSearchParams(window.location.search);

const encoded =
params.get("msg");

if(encoded){

document.body.innerHTML=`

<div style="
padding:30px;
background:black;
color:#00ffcc;
height:100vh;
font-size:20px;
">

<h1>SECRET MESSAGE</h1>

<p style="
margin-top:20px;
line-height:1.8;
white-space:pre-wrap;
">

${atob(encoded)}

</p>

</div>

`;

}

};

/* =========================
QR CODE
========================= */

function hideAll(){

document.getElementById("textBox").classList.add("hidden");
document.getElementById("wifiBox").classList.add("hidden");
document.getElementById("urlBox").classList.add("hidden");
document.getElementById("phoneBox").classList.add("hidden");
document.getElementById("emailBox").classList.add("hidden");
document.getElementById("smsBox").classList.add("hidden");

}

function changeType(){

let type =
document.getElementById("type").value;

hideAll();

if(type=="text"){
document.getElementById("textBox").classList.remove("hidden");
}

if(type=="wifi"){
document.getElementById("wifiBox").classList.remove("hidden");
}

if(type=="url"){
document.getElementById("urlBox").classList.remove("hidden");
}

if(type=="phone"){
document.getElementById("phoneBox").classList.remove("hidden");
}

if(type=="email"){
document.getElementById("emailBox").classList.remove("hidden");
}

if(type=="sms"){
document.getElementById("smsBox").classList.remove("hidden");
}

}

function generateQR(){

let type =
document.getElementById("type").value;

let finalData="";

if(type=="text"){
finalData=document.getElementById("textInput").value;
}

if(type=="wifi"){

let name =
document.getElementById("wifiName").value;

let pass =
document.getElementById("wifiPassword").value;

finalData=`WIFI:T:WPA;S:${name};P:${pass};;`;

}

if(type=="url"){
finalData=document.getElementById("urlInput").value;
}

if(type=="phone"){

let phone =
document.getElementById("phoneInput").value;

finalData=`tel:${phone}`;

}

if(type=="email"){

let email =
document.getElementById("emailInput").value;

finalData=`mailto:${email}`;

}

if(type=="sms"){

let number =
document.getElementById("smsNumber").value;

let text =
document.getElementById("smsText").value;

finalData=`SMSTO:${number}:${text}`;

}

if(finalData==""){
alert("Fill Fields");
return;
}

document.getElementById("qrcode")
.innerHTML="";

new QRCode(
document.getElementById("qrcode"),
{
text:finalData,
width:250,
height:250
}
);

}

function downloadQR(){

let canvas =
document.querySelector("#qrcode canvas");

if(!canvas){
alert("Generate QR First");
return;
}

let image =
canvas.toDataURL("image/png");

let link =
document.createElement("a");

link.href=image;

link.download="DVARY-QR.png";

link.click();

}

/* MATRIX EFFECT */

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="DVARY01";
const fontSize=16;
const columns=canvas.width/fontSize;
const drops=Array(Math.floor(columns)).fill(1);

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ffcc";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=
letters.charAt(
Math.floor(Math.random()*letters.length)
);

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize>canvas.height
&&
Math.random()>0.975
){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,35);

</script>
