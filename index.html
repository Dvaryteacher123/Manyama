<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DVARY QR FORCE DOWNLOAD</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.box{
    width:100%;
    max-width:400px;
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

textarea{
    width:100%;
    height:120px;
    border:none;
    outline:none;
    padding:15px;
    border-radius:15px;
    resize:none;
    background:#334155;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.generate{
    background:#0ea5e9;
    color:white;
}

.download{
    background:#22c55e;
    color:white;
}

#qrcode{
    margin-top:20px;
    background:white;
    padding:15px;
    border-radius:15px;
    display:flex;
    justify-content:center;
}
</style>
</head>
<body>

<div class="box">

<h1>DVARY QR PRO</h1>

<textarea id="text" placeholder="Write text or paste link..."></textarea>

<button class="generate" onclick="generateQR()">
Generate QR
</button>

<div id="qrcode"></div>

<button class="download" onclick="forceDownload()">
FORCE DOWNLOAD QR
</button>

</div>

<script>

function generateQR(){

    let text = document.getElementById("text").value;
    let qrcode = document.getElementById("qrcode");

    qrcode.innerHTML = "";

    if(text.trim() == ""){
        alert("Enter text first");
        return;
    }

    new QRCode(qrcode, {
        text:text,
        width:250,
        height:250,
        colorDark:"#000000",
        colorLight:"#ffffff",
        correctLevel:QRCode.CorrectLevel.H
    });
}

function forceDownload(){

    let qrImage = document.querySelector("#qrcode img");

    if(!qrImage){
        alert("Generate QR first");
        return;
    }

    fetch(qrImage.src)
    .then(response => response.blob())
    .then(blob => {

        let blobUrl = URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = blobUrl;
        a.download = "DVARY-QR.png";

        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

        URL.revokeObjectURL(blobUrl);

    });

}

</script>

</body>
</html>
