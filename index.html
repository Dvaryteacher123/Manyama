<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY OTP VERIFIER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #010409; --card: #0d1117; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .card { background: var(--card); border: 2px solid var(--p); padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.1); }
        .logo { font-size: 24px; font-weight: 900; color: var(--p); letter-spacing: 2px; margin-bottom: 20px; display: block; }
        
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--p); border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: center; font-family: inherit; font-size: 16px; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: inherit; transition: 0.3s; }
        .btn-send { background: var(--p); color: #000; }
        .btn-verify { background: #111; color: var(--p); border: 1px solid var(--p); }

        #otp-section, #dashboard { display: none; }
        .status-msg { font-size: 11px; color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="email-section" class="card">
        <span class="logo">OTP_SNIPER</span>
        <p class="status-msg">Ingiza Email yako kupokea kodi ya uthibitisho.</p>
        <input type="email" id="user-email" placeholder="mfano@gmail.com">
        <button class="btn btn-send" onclick="sendOTP()">TUMA KODI (OTP)</button>
    </div>

    <div id="otp-section" class="card">
        <span class="logo">VERIFY_KODI</span>
        <p class="status-msg" id="otp-info">Kodi imetumwa kwa Email yako.</p>
        <input type="number" id="otp-input" placeholder="Ingiza namba 4">
        <button class="btn btn-verify" onclick="verifyOTP()">THIBITISHA SASA</button>
    </div>

    <div id="dashboard" class="card">
        <i class="fas fa-user-shield" style="font-size: 50px; color: var(--p); margin-bottom: 15px;"></i>
        <h2 style="color: var(--p);">AGENT_VERIFIED</h2>
        <p style="font-size: 12px;">Umeruhusiwa kuingia kwenye mifumo ya Dvary.</p>
        <button class="btn btn-send" style="margin-top: 20px;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script>
        let generatedOTP = null;

        function sendOTP() {
            const email = document.getElementById('user-email').value;
            if(!email.includes('@')) return alert("Weka Email sahihi!");

            // 1. Tengeneza kodi ya kijasusi ya namba 4
            generatedOTP = Math.floor(1000 + Math.random() * 9000);
            
            // 2. Simulaction ya kutuma (Kwa sasa inaonyesha alert ili uijaribu)
            // Kitalaamu hapa tunatumia API kutuma kweli kwenye Email
            alert("DVARY SECURITY: Kodi yako ya siri ni: " + generatedOTP);

            document.getElementById('email-section').style.display = 'none';
            document.getElementById('otp-section').style.display = 'block';
            document.getElementById('otp-info').innerText = "Kodi imetumwa kwa: " + email;
        }

        function verifyOTP() {
            const userInput = document.getElementById('otp-input').value;
            
            if(userInput == generatedOTP) {
                document.getElementById('otp-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                alert("Kodi siyo sahihi! Jaribu tena.");
            }
        }
    </script>
</body>
</html>
