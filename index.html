<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY HUB | 100 AGENTS</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #010409; --card: #0d1117; --msg: #161b22; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Login Overlay */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* Header & Triple Menu */
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .menu-icons { display: flex; gap: 18px; color: var(--p); font-size: 18px; }
        .menu-icons i { cursor: pointer; transition: 0.3s; }
        .menu-icons i:hover { transform: scale(1.2); text-shadow: 0 0 10px var(--p); }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; background: var(--msg); font-size: 13px; position: relative; border: 1px solid #222; }
        .bubble .u-name { font-size: 10px; color: var(--p); font-weight: bold; display: block; margin-bottom: 4px; }
        .bubble .time { font-size: 9px; color: #555; display: block; text-align: right; margin-top: 5px; }

        /* Input Area */
        .input-area { background: #000; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; }
        .btn-send { background: var(--p); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 80%; text-align: center; border: 1px solid var(--p); }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--p); margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: var(--p);">DVARY_HUB</h1>
        <p style="color: #555; font-size: 12px; margin-bottom: 30px;">AGENT AUTHENTICATION REQUIRED</p>
        <div id="g_id_onload" data-client_id="780869166873-t31o6u8h33g3ol57f0fgi4bmrdtshdg5.apps.googleusercontent.com" data-callback="onSignIn" data-auto_prompt="true"></div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black"></div>
    </div>

    <div class="header">
        <span style="color: var(--p); font-weight: 900; font-size: 14px;">AGENT HUB (100)</span>
        <div class="menu-icons">
            <i class="fas fa-user-circle" title="Profile" onclick="openModal('profile-modal')"></i>
            <i class="fas fa-shield-alt" title="Security" onclick="openModal('security-modal')"></i>
            <i class="fas fa-cog" title="Settings" onclick="openModal('settings-modal')"></i>
        </div>
    </div>

    <div id="chat-container">
        </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Andika ujumbe wa kijasusi...">
        <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="profile-modal" class="modal" onclick="closeModals()">
        <div class="modal-content">
            <img id="u_pic" src="" class="profile-img">
            <h3 id="u_name" style="margin: 5px 0;">Agent Name</h3>
            <p id="u_email" style="font-size: 11px; color: #888;"></p>
            <button onclick="closeModals()" class="btn-send" style="width: auto; padding: 10px 20px; border-radius: 10px; margin-top: 15px;">Funga</button>
        </div>
    </div>

    <div id="security-modal" class="modal" onclick="closeModals()">
        <div class="modal-content">
            <i class="fas fa-lock" style="font-size: 40px; color: var(--p);"></i>
            <h3>SECURITY STATUS</h3>
            <p style="font-size: 12px; color: #888;">Ntfy Cache: <span style="color:var(--p)">ENABLED</span><br>Encryption: <span style="color:var(--p)">AES-256</span></p>
        </div>
    </div>

    <script>
        const NTFY_TOPIC = "dvary_agents_100_secret"; // Badili hii iwe ya kwako ya siri
        let currentAgent = { name: "Guest", pic: "" };

        function onSignIn(response) {
            const user = JSON.parse(atob(response.credential.split('.')[1]));
            currentAgent = { name: user.name, pic: user.picture, email: user.email };
            document.getElementById('u_pic').src = user.picture;
            document.getElementById('u_name').innerText = user.name;
            document.getElementById('u_email').innerText = user.email;
            document.getElementById('login-screen').style.display = 'none';
            loadCache();
            subscribe();
        }

        // 1. Kupata meseji za zamani (Cache)
        async function loadCache() {
            try {
                const response = await fetch(`https://ntfy.sh/${NTFY_TOPIC}/json?poll=1&cache=1`);
                const data = await response.text();
                const lines = data.split('\n').filter(line => line.trim() !== "");
                lines.forEach(line => {
                    const msgData = JSON.parse(line);
                    if (msgData.message) appendMessage(msgData.message, false);
                });
            } catch (e) { console.log("Cache error", e); }
        }

        // 2. Kutuma Meseji
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value) return;
            const fullMsg = `${currentAgent.name}: ${input.value}`;
            
            await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
                method: 'POST',
                body: fullMsg
            });
            input.value = "";
        }

        // 3. Kupokea Meseji Live
        function subscribe() {
            const eventSource = new EventSource(`https://ntfy.sh/${NTFY_TOPIC}/sse`);
            eventSource.onmessage = (e) => {
                const data = JSON.parse(e.data);
                appendMessage(data.message, true);
            };
        }

        function appendMessage(text, isLive) {
            const chat = document.getElementById('chat-container');
            const split = text.split(': ');
            const name = split[0];
            const content = split[1] || "";

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = `<span class="u-name">${name}</span> ${content} <span class="time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
            chat.appendChild(bubble);
            chat.scrollTop = chat.scrollHeight;
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
