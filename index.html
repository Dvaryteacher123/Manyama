<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY AI HUB | AGENT 100</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #010409; --card: #0d1117; --msg: #161b22; --ai: #8a2be2; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 1. Registration Screen */
        #reg-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .reg-box { background: var(--card); border: 2px solid var(--p); padding: 35px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 204, 0.15); }
        .reg-box h2 { color: var(--p); letter-spacing: 2px; margin-bottom: 10px; }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: var(--p); }
        .btn-start { background: var(--p); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-start:hover { transform: scale(1.02); background: #fff; }

        /* 2. Chat UI */
        .header { background: #000; padding: 15px 20px; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .menu-icons { display: flex; gap: 20px; color: var(--p); font-size: 19px; }
        .menu-icons i { cursor: pointer; }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #0d1117 0%, #010409 100%); }
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 20px; background: var(--msg); font-size: 14px; border: 1px solid #222; align-self: flex-start; line-height: 1.5; }
        .bubble.me { align-self: flex-end; border-color: var(--p); background: #002211; border-bottom-right-radius: 4px; }
        .bubble.ai-msg { align-self: center; border-color: var(--ai); background: #1a0033; color: #f0e6ff; width: 90%; border-radius: 15px; box-shadow: 0 0 10px rgba(138, 43, 226, 0.2); }
        .u-name { font-size: 10px; color: var(--p); font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }

        .input-area { background: #000; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; align-items: center; }
        .btn-send { background: var(--p); color: #000; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--p); }
    </style>
</head>
<body>

    <div id="reg-screen">
        <div class="reg-box">
            <i class="fas fa-robot" style="font-size: 40px; color: var(--p); margin-bottom: 15px;"></i>
            <h2>DVARY AI HUB</h2>
            <p style="font-size: 12px; color: #666; margin-bottom: 25px;">Mifumo ya kijasusi inasubiri utambulisho wako.</p>
            <input type="text" id="reg-name" placeholder="Andika Jina lako hapa...">
            <button class="btn-start" onclick="startApp()">ANZISHA AGENT HUB</button>
        </div>
    </div>

    <div class="header">
        <span style="color: var(--p); font-weight: 900; font-size: 14px; letter-spacing: 1px;">DVARY_AI_NET v2.0</span>
        <div class="menu-icons">
            <i class="fas fa-user-shield" onclick="openModal('profile-modal')"></i>
            <i class="fas fa-microchip" onclick="openModal('status-modal')"></i>
        </div>
    </div>

    <div id="chat-container">
        </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Anza na 'AI' kumuuliza Dvary AI...">
        <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="profile-modal" class="modal" onclick="closeModal()">
        <div class="modal-content">
            <i class="fas fa-id-badge" style="font-size: 50px; color: var(--p); margin-bottom: 15px;"></i>
            <h3 id="display-name" style="margin: 0;">AGENT</h3>
            <p style="font-size: 12px; color: var(--p);">Status: VERIFIED BY DVARY</p>
        </div>
    </div>

    <div id="status-modal" class="modal" onclick="closeModal()">
        <div class="modal-content">
            <h3>SYSTEM STATUS</h3>
            <p style="font-size: 12px; text-align: left; color: #888;">
                • AI Core: Gemini 1.5 Flash<br>
                • Network: Ntfy.sh (Active)<br>
                • Encryption: AES-256<br>
                • Capacity: 100 Agents
            </p>
        </div>
    </div>

    <script>
        // DATA ZA KIJASUSI (Usizibadili isipokuwa Topic)
        const API_KEY = "AIzaSyCZRL7riGzC7JlGsoH2-X2waafCp5mTZkI";
        const NTFY_TOPIC = "dvary_ai_network_secret_2026"; // Topic ya siri
        let currentUser = "Agent";

        function startApp() {
            const name = document.getElementById('reg-name').value.trim();
            if(!name) return alert("Mwalimu, weka jina kwanza!");
            currentUser = name;
            document.getElementById('display-name').innerText = name.toUpperCase();
            document.getElementById('reg-screen').style.display = 'none';
            
            loadCache();
            subscribe();
        }

        async function loadCache() {
            try {
                const res = await fetch(`https://ntfy.sh/${NTFY_TOPIC}/json?poll=1&cache=1`);
                const data = await res.text();
                data.split('\n').filter(l => l.trim()).forEach(line => {
                    const m = JSON.parse(line);
                    if(m.message) appendMessage(m.message);
                });
            } catch(e) {}
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            // 1. Tuma ujumbe wako kwa Agents wengine
            await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
                method: 'POST',
                body: `${currentUser}::${text}`
            });
            input.value = "";

            // 2. Angalia kama ni amri kwa AI
            if(text.toUpperCase().startsWith("AI")) {
                const prompt = text.substring(2).trim();
                askAI(prompt);
            }
        }

        async function askAI(prompt) {
            // Onyesha kuwa AI inafikiria kwa wengine pia
            await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, { 
                method: 'POST', 
                body: `DVARY_AI::Changanuzi zinaendelea... subiri kidogo Agent ${currentUser}.` 
            });

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const aiText = data.candidates[0].content.parts[0].text;

                // Tuma jibu la AI kwenye Network
                await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, { 
                    method: 'POST', 
                    body: `DVARY_AI::${aiText}` 
                });
            } catch(e) {
                console.error(e);
            }
        }

        function subscribe() {
            const es = new EventSource(`https://ntfy.sh/${NTFY_TOPIC}/sse`);
            es.onmessage = (e) => {
                const data = JSON.parse(e.data);
                appendMessage(data.message);
            };
        }

        function appendMessage(text) {
            const container = document.getElementById('chat-container');
            const parts = text.split('::');
            const name = parts[0];
            const content = parts.slice(1).join('::');
            if(!content) return;

            const isAI = name === "DVARY_AI";
            const isMe = name === currentUser;

            const bubble = document.createElement('div');
            bubble.className = `bubble ${isMe ? 'me' : ''} ${isAI ? 'ai-msg' : ''}`;
            bubble.innerHTML = `<span class="u-name">${name}</span> ${content}`;
            
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
