<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SECURITY PROFILE</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0d1117; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .card { background: var(--card); border: 1px solid var(--p); padding: 30px; border-radius: 25px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 0 25px rgba(0,255,204,0.15); }
        .logo { font-size: 22px; font-weight: 900; color: var(--p); letter-spacing: 2px; margin-bottom: 30px; display: block; }

        /* Profile Style */
        #profile-area { display: none; }
        .profile-pic { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--p); margin-bottom: 15px; box-shadow: 0 0 15px var(--p); object-fit: cover; }
        .user-name { font-size: 20px; font-weight: bold; color: #fff; display: block; }
        .user-email { font-size: 12px; color: #888; display: block; margin-bottom: 25px; }

        .security-status { background: rgba(0,255,204,0.05); border: 1px dashed var(--p); padding: 15px; border-radius: 12px; font-size: 12px; margin-bottom: 20px; }
        .btn-logout { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 11px; }
    </style>
</head>
<body>

    <div id="login-section" class="card">
        <span class="logo">DVARY_SECURITY</span>
        <p style="font-size: 11px; color: #888; margin-bottom: 35px;">UTHIBITISHO WA GOOGLE UNAHITAJIKA ILI KUPATA DATA ZA KIJASUSI.</p>
        
        <div id="g_id_onload"
             data-client_id="780869166873-t31o6u8h33g3ol57f0fgi4bmrdtshdg5.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_black" data-size="large" data-shape="pill"></div>
    </div>

    <div id="profile-area" class="card">
        <span class="logo" style="font-size: 16px;">AGENT_VERIFIED</span>
        
        <img id="u_pic" src="" alt="Profile" class="profile-pic">
        <span id="u_name" class="user-name">Loading...</span>
        <span id="u_email" class="user-email">email@example.com</span>

        <div class="security-status">
            <i class="fas fa-shield-check" style="color: var(--p); margin-right: 10px;"></i>
            Status: <span style="color: var(--p);">Protected by Dvary</span>
            <br>
            <small style="color: #555; font-size: 9px;">Akaunti yako imeunganishwa kitalaamu.</small>
        </div>

        <button class="btn-logout" onclick="location.reload()">FUTA ACCESS / LOGOUT</button>
    </div>

    <script>
        // Kazi ya ku-decode data ya Google (JWT)
        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            // Tunapata data zote za mtumiaji hapa
            const userData = parseJwt(response.credential);
            
            // Ficha login, onyesha Profile
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('profile-area').style.display = 'block';

            // Weka data kwenye kioo kitalaamu
            document.getElementById('u_name').innerText = userData.name.toUpperCase();
            document.getElementById('u_email').innerText = userData.email;
            document.getElementById('u_pic').src = userData.picture;
            
            console.log("Karibu Agent: " + userData.name);
        }
    </script>
</body>
</html>
