<!DOCTYPE html>
<html>
<head>
<title>TikTok Viewer</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    max-width: 400px;
    margin: auto;
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📱 TikTok Video Viewer</h2>

<input type="text" id="url" placeholder="Paste TikTok link hapa">
<br>

<button onclick="loadVideo()">Show Video</button>

<div id="videoBox"></div>

</div>

<!-- TikTok official script -->
<script async src="https://www.tiktok.com/embed.js"></script>

<script>
function loadVideo(){
    let url = document.getElementById("url").value;

    if(!url){
        alert("Weka link kwanza");
        return;
    }

    // Extract video ID
    let videoId = url.split("/video/")[1];

    if(!videoId){
        alert("Link sio sahihi");
        return;
    }

    document.getElementById("videoBox").innerHTML = `
    <blockquote class="tiktok-embed" cite="${url}" data-video-id="${videoId}" style="max-width: 100%;">
    </blockquote>
    `;

    // Reload TikTok script
    if(window.tiktokEmbedLoad) window.tiktokEmbedLoad();
}
</script>

</body>
</html>
