<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY HUB | BYPASS VERSION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #010409; --card: #0d1117; --msg: #161b22; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Step 1: Registration Overlay */
        #registration-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .reg-box { background: var(--card); border: 2px solid var(--p); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        .btn-start { background: var(--p); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }

        /* Header & Icons */
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .menu-icons { display: flex; gap: 20px; color: var(--p); }
        .menu-icons i { cursor: pointer; font-size: 18px; }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 85%; padding: 10px 15px; border-radius: 18px; background: var(--msg); font-size: 13px; border: 1px solid #222; align-self: flex-start; }
        .bubble.me { align-self: flex-end; border-color: var(--p); background: #002211; }
        .u-name { font-size: 10px; color: var(--p); font-weight: bold; display: block; margin-bottom: 3px; }
        .time { font-size: 8px; color: #555; display: block; text-align: right; margin-top: 4px; }

        /* Input area */
        .input-area { background: #000; padding: 12px; display: flex; gap: 8px; border-top: 1px solid #222; }
        .btn-send { background: var(--p); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 15px; width: 80%; text-align: center; border: 1px solid var(--p); }
    </style>
</head>
<body>

    <div id="registration-screen">
        <div class="reg-box">
            <h2 style="color: var(--p); margin-top: 0;">DVARY HUB</h2>
            <p style="font-size: 11px; color: #888; margin-bottom: 20px;">Tengeneza Utambulisho wako wa Kijasusi</p>
            <input type="text" id="reg-name" placeholder="Jina lako (mf: Agent Elia)">
            <input type="text" id="reg-pic" placeholder="Link ya Picha yako (Optional)">
            <button class="btn-start" onclick="startApp()">INGIA KWENYE HUB</button>
        </div>
    </div>

    <div class="header">
        <span style="color: var(--p); font-weight: bold; font-size: 14px;">AGENT HUB (100)</span>
        <div class="menu-icons">
            <i class="fas fa-user-circle" onclick="openModal('profile-modal')"></i>
            <i class="fas fa-shield-alt" onclick="openModal('security-modal')"></i>
            <i class="fas fa-info-circle" onclick="openModal('info-modal')"></i>
        </div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Andika ujumbe...">
        <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="profile-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content">
            <img id="display-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width: 70px; border-radius: 50%; border: 2px solid var(--p);">
            <h3 id="display-name" style="margin: 10px 0;">Agent</h3>
            <p style="font-size: 11px; color: var(--p);">ID: VERIFIED AGENT</p>
        </div>
    </div>

    <div id="security-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content">
            <i class="fas fa-user-secret" style="font-size: 40px; color: var(--p);"></i>
            <h3>SECURITY STATUS</h3>
            <p style="font-size: 12px;">Mawasiliano yanalindwa na <b>ntfy Cache</b>. Hakuna data inayovuja nje ya Hub hii.</p>
        </div>
    </div>

    <div id="info-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content">
            <h3>SYSTEM INFO</h3>
            <p style="font-size: 11px; color: #888;">DVARY HUB V2.0<br>Capacity: 100 Agents<br>Server: ntfy.sh (Global)</p>
        </div>
    </div>

    <script>
        const NTFY_TOPIC = "dvary_secret_hub_2026"; // Hii ibadili iwe neno lako la siri
        let currentUser = { name: "Guest", pic: "" };

        function startApp() {
            const name = document.getElementById('reg-name').value;
            const pic = document.getElementById('reg-pic').value;
            if(!name) return alert("Mwalimu, weka jina kwanza!");

            currentUser.name = name;
            currentUser.pic = pic || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

            document.getElementById('display-name').innerText = currentUser.name;
            document.getElementById('display-pic').src = currentUser.pic;
            document.getElementById('registration-screen').style.display = 'none';

            loadCache();
            subscribe();
        }

        async function loadCache() {
            try {
                const res = await fetch(`https://ntfy.sh/${NTFY_TOPIC}/json?poll=1&cache=1`);
                const data = await res.text();
                data.split('\n').filter(l => l.trim()).forEach(l => {
                    const m = JSON.parse(l);
                    if(m.message) appendMessage(m.message);
                });
            } catch(e) {}
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if(!input.value) return;
            const payload = `${currentUser.name}::${input.value}`;
            await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, { method: 'POST', body: payload });
            input.value = "";
        }

        function subscribe() {
            const es = new EventSource(`https://ntfy.sh/${NTFY_TOPIC}/sse`);
            es.onmessage = (e) => {
                const data = JSON.parse(e.data);
                appendMessage(data.message);
            };
        }

        function appendMessage(text) {
            const container = document.getElementById('chat-container');
            const [name, content] = text.split('::');
            if(!content) return;

            const isMe = name === currentUser.name;
            const bubble = document.createElement('div');
            bubble.className = `bubble ${isMe ? 'me' : ''}`;
            bubble.innerHTML = `<span class="u-name">${name}</span> ${content} <span class="time">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
            
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    </script>
</body>
</html>
