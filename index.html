<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY CONNECT PRO</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --primary: #00ff00; --bg: #0a0a0a; --chat-bg: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        header { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); }
        h2 { margin: 0; color: var(--primary); letter-spacing: 2px; }

        /* Main Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Chat Area */
        #chat-section { width: 350px; background: var(--chat-bg); display: flex; flex-direction: column; border-right: 1px solid #333; }
        #chat-display { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .received { background: #333; align-self: flex-start; }
        .sent { background: #054d44; align-self: flex-end; border: 1px solid var(--primary); }

        /* Video Area */
        #video-section { flex: 1; background: #000; position: relative; }
        #meet-container { width: 100%; height: 100%; }

        /* Controls */
        .controls { padding: 15px; background: #000; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
        button { padding: 10px 20px; background: var(--primary); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: black; }
        
        /* Setup Overlay */
        #setup { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .setup-box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid var(--primary); text-align: center; }
    </style>
</head>
<body>

    <div id="setup">
        <div class="setup-box">
            <h3 style="color:var(--primary)">JOIN DVARY CONNECT</h3>
            <input type="text" id="room-name" placeholder="Andika Jina la Group (Room Name)...">
            <br><br>
            <button onclick="startApp()">INGIA KWENYE GROUP</button>
        </div>
    </div>

    <header>
        <h2>[ DVARY CONNECT ]</h2>
    </header>

    <div class="main-container">
        <div id="chat-section">
            <div id="chat-display">
                <div class="msg received">Karibu kwenye ujasusi wa Dvary Connect!</div>
            </div>
            <div class="controls">
                <input type="text" id="chat-input" placeholder="Andika ujumbe...">
                <button onclick="sendMessage()">Tuma</button>
            </div>
        </div>

        <div id="video-section">
            <div id="meet-container"></div>
            <div style="position:absolute; top:10px; right:10px;">
                <button onclick="toggleVideo()" style="background:red; color:white;">End Call</button>
            </div>
        </div>
    </div>

    <script>
        let api = null;

        function startApp() {
            const room = document.getElementById('room-name').value;
            if (!room) return alert("Weka jina la chumba kwanza!");
            
            document.getElementById('setup').style.display = 'none';
            
            // Washa Video Call (Jitsi Meet)
            const domain = 'meet.jit.si';
            const options = {
                roomName: 'Dvary_' + room,
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-container'),
                userInfo: { displayName: 'Mwalimu Elia' },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: ['microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen', 'fittowidth', 'hangup', 'profile', 'chat', 'settings', 'videoquality', 'filmstrip', 'feedback', 'stats', 'shortcuts', 'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone']
                }
            };
            api = new JitsiMeetExternalAPI(domain, options);
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if (!input.value) return;

            const display = document.getElementById('chat-display');
            const newMsg = document.createElement('div');
            newMsg.className = 'msg sent';
            newMsg.innerText = input.value;
            display.appendChild(newMsg);
            
            // Scroll to bottom
            display.scrollTop = display.scrollHeight;
            input.value = '';
        }

        function toggleVideo() {
            if(api) {
                api.dispose();
                location.reload();
            }
        }
    </script>
</body>
</html>
