<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dvary WhatsApp Pro</title>
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --wa-green: #075e54; --wa-teal: #128c7e; --wa-light-green: #dcf8c6; --white: #ffffff; --grey: #ededed; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #d1d7db; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .app-container { width: 100%; height: 100%; max-width: 1400px; display: flex; background: #f0f2f5; box-shadow: 0 6px 18px rgba(0,0,0,0.1); overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 30%; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
        .sidebar-header { background: var(--grey); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; object-fit: cover; background: #ccc; }
        
        .search-box { padding: 8px; background: #fff; border-bottom: 1px solid #f6f6f6; }
        .search-box input { width: 95%; padding: 7px; border-radius: 8px; border: none; background: #f0f2f5; outline: none; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px; cursor: pointer; border-bottom: 1px solid #f2f2f2; }
        .chat-item:hover { background: #f5f6f6; }
        .item-img { width: 49px; height: 49px; border-radius: 50%; margin-right: 15px; }
        .item-info h4 { margin: 0; font-size: 16px; font-weight: 500; }
        .item-info p { margin: 2px 0 0; font-size: 13px; color: #667781; }

        /* MAIN CHAT AREA */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #efeae2; position: relative; }
        .chat-header { background: var(--grey); padding: 10px 16px; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; margin-right: 15px; }
        .header-details { flex: 1; }
        .header-details h4 { margin: 0; font-size: 16px; }
        .header-details p { margin: 0; font-size: 12px; color: #667781; }

        .messages-area { flex: 1; padding: 20px; overflow-y: auto; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 8px 12px; border-radius: 8px; font-size: 14px; max-width: 65%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); position: relative; }
        .bubble.sent { background: var(--wa-light-green); align-self: flex-end; }
        .bubble.received { background: #fff; align-self: flex-start; }

        .input-area { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-area input { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; outline: none; font-size: 15px; }
        .send-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: #54656f; }

        /* VIDEO CALL OVERLAY */
        #video-overlay { position: absolute; inset: 0; background: #000; z-index: 100; display: none; }
        .end-call { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: #fff; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 110; }

        /* PROFILE SETUP MODAL */
        #profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: #fff; padding: 30px; border-radius: 10px; text-align: center; width: 300px; }
    </style>
</head>
<body>

    <div id="profile-modal">
        <div class="modal-content">
            <h3>Sanifu Profile Yako</h3>
            <label for="picha-input">
                <img id="preview-img" src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" class="user-avatar" style="width:100px; height:100px; margin-bottom:10px;">
            </label>
            <input type="file" id="picha-input" accept="image/*" style="display:none" onchange="previewFile()">
            <input type="text" id="user-name-input" placeholder="Andika Jina Lako..." style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:5px;">
            <button onclick="saveProfile()" style="background:var(--wa-teal); color:#fff; border:none; padding:10px 20px; border-radius:5px; width:100%; cursor:pointer;">ANZA KUTUMIA</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <img id="my-profile-pic" class="user-avatar" src="">
                <div style="font-weight:bold; color:var(--wa-green);">WhatsApp</div>
                <div style="color:#54656f; cursor:pointer;">⋮</div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Tafuta au anza chat mpya">
            </div>
            <div class="chat-list">
                <div class="chat-item" onclick="openChat('Dvary Group', 'D')">
                    <div class="item-img" style="background:#8e44ad; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold;">D</div>
                    <div class="item-info">
                        <h4>Dvary Group</h4>
                        <p>Mwalimu: Karibu kitalaamu!</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <img id="header-pic" src="https://via.placeholder.com/40">
                <div class="header-details">
                    <h4 id="header-name">Dvary Group</h4>
                    <p>online</p>
                </div>
                <div style="display:flex; gap:20px; color:var(--wa-green); cursor:pointer;">
                    <span onclick="startVideoCall()">📹</span>
                    <span>📞</span>
                    <span>⋮</span>
                </div>
            </div>

            <div class="messages-area" id="msg-area">
                <div class="bubble received">Karibu! Hii ni Dvary WhatsApp Manyama Edition. 🌸</div>
            </div>

            <div class="input-area">
                <button class="send-btn">😊</button>
                <input type="text" id="msg-input" placeholder="Andika ujumbe...">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>

            <div id="video-overlay">
                <div id="jitsi-container" style="height: 100%;"></div>
                <button class="end-call" onclick="endCall()">End Call</button>
            </div>
        </div>
    </div>

    <script>
        let api = null;
        let pichaData = "https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png";

        function previewFile() {
            const file = document.getElementById('picha-input').files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById('preview-img').src = reader.result;
                pichaData = reader.result;
            }
            if (file) reader.readAsDataURL(file);
        }

        function saveProfile() {
            const name = document.getElementById('user-name-input').value;
            if(!name) return alert("Weka jina kwanza!");
            document.getElementById('my-profile-pic').src = pichaData;
            document.getElementById('profile-modal').style.display = 'none';
        }

        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(!inp.value) return;
            const area = document.getElementById('msg-area');
            const div = document.createElement('div');
            div.className = "bubble sent";
            div.innerText = inp.value;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
            inp.value = "";
        }

        function startVideoCall() {
            document.getElementById('video-overlay').style.display = 'block';
            const options = {
                roomName: "Dvary_Private_Room",
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#jitsi-container'),
                configOverwrite: { prejoinPageEnabled: false, disableDeepLinking: true },
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup', 'tileview'] }
            };
            api = new JitsiMeetExternalAPI("meet.jit.si", options);
        }

        function endCall() {
            if(api) api.dispose();
            document.getElementById('video-overlay').style.display = 'none';
        }

        function openChat(name, initial) {
            document.getElementById('header-name').innerText = name;
            // Hapa unaweza kubadili picha ya header kulingana na chat
        }
    </script>
</body>
</html>
