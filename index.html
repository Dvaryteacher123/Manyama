<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DVARY SUPER APP PRO</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--p:#00ffcc;
--bg:#000;
--card:#111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--bg);
color:white;
overflow-x:hidden;
}

#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
opacity:.25;
}

header{
position:sticky;
top:0;
z-index:100;
background:rgba(0,0,0,.85);
backdrop-filter:blur(10px);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--p);
}

.logo{
font-size:22px;
font-weight:bold;
color:var(--p);
letter-spacing:2px;
}

.menu{
font-size:22px;
color:var(--p);
cursor:pointer;
}

.search-box{
padding:10px;
background:#050505;
position:sticky;
top:65px;
z-index:90;
}

.search-box input{
width:100%;
padding:14px;
border-radius:30px;
border:none;
outline:none;
background:#111;
color:white;
border:1px solid #222;
}

.nav{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
padding:10px;
background:#0d0d0d;
}

.nav button{
padding:12px 16px;
border:none;
border-radius:30px;
background:var(--p);
color:#000;
font-weight:bold;
cursor:pointer;
}

.section{
display:none;
padding:15px;
max-width:500px;
margin:auto;
}

.active{
display:block;
}

.card{
background:rgba(17,17,17,.95);
padding:20px;
border-radius:20px;
border:1px solid var(--p);
margin-top:15px;
box-shadow:0 0 15px rgba(0,255,204,.1);
}

.title{
font-size:22px;
font-weight:bold;
color:var(--p);
margin-bottom:15px;
text-align:center;
}

input,textarea,select{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
outline:none;
background:#1b1b1b;
color:white;
}

textarea{
height:220px;
resize:none;
}

.btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:var(--p);
color:#000;
font-weight:bold;
cursor:pointer;
}

.btn2{
background:#25D366;
color:white;
}

.poster{
width:100%;
max-width:220px;
display:block;
margin:auto;
margin-top:15px;
border-radius:15px;
}

.result-box{
display:none;
padding:15px;
margin-top:15px;
background:#dcf8c6;
border-radius:12px;
color:black;
word-break:break-all;
}

.footer{
padding:20px;
text-align:center;
font-size:12px;
color:#666;
}

.tools{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.tool{
padding:15px;
background:#161616;
border:1px solid #222;
border-radius:12px;
text-align:center;
}

a{
text-decoration:none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<header>
<div class="logo">DVARY SUPER APP</div>
<div class="menu">
<i class="fas fa-ellipsis-v"></i>
</div>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search anything..." onkeyup="searchSection()">
</div>

<div class="nav">
<button onclick="showSection('home')">HOME</button>
<button onclick="showSection('unban')">UNBAN</button>
<button onclick="showSection('movie')">MOVIES</button>
<button onclick="showSection('linkpro')">LINK PRO</button>
<button onclick="showSection('contact')">CONTACT</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
<div class="card">

<div class="title">WELCOME</div>

<p>
Karibu kwenye DVARY SUPER APP PRO 🔥
App hii ina:
</p>

<div class="tools">
<div class="tool">🔓 UNBAN TOOL</div>
<div class="tool">🎬 MOVIE SEARCH</div>
<div class="tool">☁️ LINK GENERATOR</div>
<div class="tool">📱 MOBILE UI</div>
</div>

</div>
</div>

<!-- UNBAN -->
<div id="unban" class="section">

<div class="card">

<div class="title">DVARY UNBAN MASTER</div>

<select id="langSwitch" onchange="changeContent()">
<option value="en">English</option>
<option value="sw">Kiswahili</option>
<option value="fr">French</option>
<option value="ar">Arabic</option>
</select>

<select id="themeSwitch" onchange="changeTheme()">
<option value="matrix">Matrix Green</option>
<option value="hacker">Hacker Red</option>
<option value="cyber">Cyber Blue</option>
<option value="gold">Gold Edition</option>
</select>

<input type="text" id="phoneNumber" placeholder="+255...">

<textarea id="appealMsg" readonly></textarea>

<button class="btn" id="btn_text" onclick="sendEmail()">SEND OFFICIAL APPEAL</button>

<a href="https://wa.me/255718278672" target="_blank">
<button class="btn btn2">WHATSAPP HELP</button>
</a>

</div>
</div>

<!-- MOVIE -->
<div id="movie" class="section">

<div class="card">

<div class="title">MOVIE SEARCH</div>

<input type="text" id="movieInput" placeholder="Enter movie name...">

<button class="btn" onclick="tafutaMovie()">SEARCH MOVIE</button>

<div id="movieResult" style="display:none;">

<img id="moviePoster" class="poster">

<h2 id="movieTitle"></h2>

<p id="moviePlot"></p>

<a id="watchBtn" target="_blank">
<button class="btn">WATCH ONLINE</button>
</a>

</div>

</div>
</div>

<!-- LINK PRO -->
<div id="linkpro" class="section">

<div class="card">

<div class="title">DVARY LINK PRO 🌸</div>

<input type="file" id="file-input">

<button class="btn" onclick="uploadFile()">UPLOAD FILE</button>

<textarea id="text-input" placeholder="Write your secret text..."></textarea>

<button class="btn" onclick="generateLink()">GENERATE TEXT LINK</button>

<div class="result-box" id="result-box">
<p id="final-link"></p>
<button class="btn" onclick="copyLink()">COPY LINK</button>
</div>

</div>
</div>

<!-- CONTACT -->
<div id="contact" class="section">

<div class="card">

<div class="title">CONTACT ME</div>

<h2 style="text-align:center;color:var(--p);">
+255 718 278 672
</h2>

<a href="https://wa.me/255718278672" target="_blank">
<button class="btn btn2">CHAT WHATSAPP</button>
</a>

</div>
</div>

<div class="footer">
DVARY SUPER APP PRO VERSION
</div>

<script>

function showSection(id){
document.querySelectorAll('.section').forEach(sec=>{
sec.classList.remove('active');
});
document.getElementById(id).classList.add('active');
}

function searchSection(){
let input=document.getElementById('search').value.toLowerCase();

document.querySelectorAll('.section').forEach(sec=>{
if(sec.innerText.toLowerCase().includes(input)){
sec.style.display='block';
}else{
sec.style.display='none';
}
});
}

const content={
en:{
btn:"SEND OFFICIAL APPEAL",
msg:"Dear WhatsApp Support Team,\n\nI am writing to appeal the suspension of my account [NUMBER]. I was surprised to discover my account banned because I always try to follow your Terms of Service and community guidelines. This account is very important for my business communication, family contacts, and personal use.\n\nIf any violation happened unknowingly, I sincerely apologize and promise to follow all WhatsApp rules in the future. Please kindly review my account activity and restore my account access as soon as possible.\n\nThank you for your support and understanding.\n\nBest regards."
},

sw:{
btn:"TUMA MAOMBI RASMI",
msg:"Ndugu Timu ya WhatsApp,\n\nNinaandika ujumbe huu kuomba mapitio ya akaunti yangu [NUMBER] ambayo imefungiwa. Nimeshtushwa kuona akaunti yangu imezuiwa wakati nimekuwa nikijitahidi kufuata sheria na masharti ya WhatsApp.\n\nAkaunti hii ni muhimu sana kwa biashara, mawasiliano ya familia, na matumizi yangu binafsi. Kama kuna kosa limetokea bila kukusudia, ninaomba radhi na ninaahidi kufuata sheria zote za WhatsApp kuanzia sasa.\n\nNaomba mfanye uchunguzi wa kina na mnisaidie kurejeshewa akaunti yangu haraka iwezekanavyo.\n\nAsanteni kwa msaada wenu."
},

fr:{
btn:"ENVOYER",
msg:"Bonjour WhatsApp, veuillez examiner mon compte [NUMBER]."
},

ar:{
btn:"إرسال",
msg:"يرجى مراجعة الحساب [NUMBER]."
}
};

const themes={
matrix:{color:"#00ffcc",bg:"#000"},
hacker:{color:"#ff003c",bg:"#000"},
cyber:{color:"#00ccff",bg:"#050810"},
gold:{color:"#ffcc00",bg:"#111"}
};

function changeContent(){
const lang=document.getElementById('langSwitch').value;
document.getElementById('appealMsg').value=content[lang].msg;
document.getElementById('btn_text').innerText=content[lang].btn;
}

function changeTheme(){
const theme=document.getElementById('themeSwitch').value;
const style=themes[theme];

document.documentElement.style.setProperty('--p',style.color);
document.documentElement.style.setProperty('--bg',style.bg);
}

changeContent();

function sendEmail(){
const number=document.getElementById('phoneNumber').value;
const lang=document.getElementById('langSwitch').value;

if(!number) return alert("Enter number!");

let body=content[lang].msg.replace("[NUMBER]",number);

window.location.href=
`mailto:support@whatsapp.com?subject=Unban Request&body=${encodeURIComponent(body)}`;
}

async function tafutaMovie(){

let movie=document.getElementById('movieInput').value;

if(!movie) return;

let res=await fetch(`https://www.omdbapi.com/?t=${movie}&apikey=A46b7201`);
let data=await res.json();

if(data.Response==="True"){

document.getElementById('movieResult').style.display='block';

document.getElementById('moviePoster').src=data.Poster;

document.getElementById('movieTitle').innerText=data.Title;

document.getElementById('moviePlot').innerText=data.Plot;

document.getElementById('watchBtn').href=
`https://vidsrc.to/embed/movie/${data.imdbID}`;

}else{
alert("Movie not found!");
}

}

function uploadFile(){

let file=document.getElementById('file-input').files[0];

if(!file) return alert("Choose file!");

document.getElementById('result-box').style.display='block';

document.getElementById('final-link').innerText=
"Uploaded File: "+file.name;

}

function generateLink(){

let text=document.getElementById('text-input').value;

if(!text) return alert("Write text!");

let encoded=btoa(text);

let link=window.location.href+"?msg="+encoded;

document.getElementById('result-box').style.display='block';

document.getElementById('final-link').innerText=link;

}

function copyLink(){

navigator.clipboard.writeText(
document.getElementById('final-link').innerText
);

alert("Copied!");
}

/* MATRIX */

const canvas=document.getElementById('matrix');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters="DVARY01";
const fontSize=16;
const columns=canvas.width/fontSize;

const drops=Array(Math.floor(columns)).fill(1);

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--p');

ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters.charAt(Math.floor(Math.random()*letters.length));

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;
}
}

setInterval(draw,35);

</script>

</body>
  </html>
