<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY FOOTBALL SNIPER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0d1117; --accent: #ffcc00; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 15px; }
        
        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--p); }
        .logo { font-size: 22px; font-weight: 900; color: var(--p); letter-spacing: 2px; }

        .lang-btns { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .lang-btn { background: none; border: 1px solid var(--p); color: var(--p); padding: 4px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .lang-btn.active { background: var(--p); color: #000; }

        .card { background: var(--card); border: 1px solid #222; padding: 20px; border-radius: 15px; margin-top: 20px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 10px; color: var(--p); text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }
        
        .btn-analyze { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        #result-box { display: none; margin-top: 20px; border: 1px dashed var(--p); padding: 15px; border-radius: 10px; background: rgba(0,255,204,0.05); }
        .vibe-text { color: var(--accent); font-style: italic; font-size: 13px; margin-top: 15px; display: block; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FOOTBALL_SNIPER</div>
        <div class="lang-btns">
            <button id="sw-btn" class="lang-btn active" onclick="setLang('sw')">SW</button>
            <button id="en-btn" class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="container" style="max-width: 450px; margin: auto;">
        <div class="card">
            <div class="input-group">
                <label id="lbl-t1">Timu ya Nyumbani (Home):</label>
                <input type="text" id="team1" placeholder="Mfano: Real Madrid">
            </div>
            <div class="input-group">
                <label id="lbl-t2">Timu ya Ugenini (Away):</label>
                <input type="text" id="team2" placeholder="Mfano: Bayern Munich">
            </div>
            <button class="btn-analyze" onclick="analyzeMatch()" id="btn-txt">CHAMBUA KIPAMBAUGO</button>
        </div>

        <div id="result-box">
            <h3 id="res-head" style="margin-top:0; color: var(--p);">MATOKEO YA UCHAMBUZI:</h3>
            <div id="prediction-output" style="font-size: 15px;"></div>
            <span class="vibe-text" id="vibe-output"></span>
        </div>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" style="display:block; text-align:center; color: #25d366; text-decoration:none; margin-top:30px; font-weight:bold; font-size:12px;">
            <i class="fab fa-whatsapp"></i> JOIN DVARY SPORTS CHANNEL
        </a>
    </div>

    <script>
        const ui = {
            sw: { t1: "Timu ya Nyumbani:", t2: "Timu ya Ugenini:", btn: "CHAMBUA KIPAMBAUGO", head: "UCHAMBUZI WA DVARY:", vibes: ["Hustle kwanza, mapenzi baadae.", "Uaminifu ni ghali, usitegemee kwa watu rahisi.", "Simba hafugwi, na hustler hashindwi."], win: "Uwezekano wa kushinda:" },
            en: { t1: "Home Team:", t2: "Away Team:", btn: "ANALYZE FIXTURE", head: "DVARY ANALYSIS:", vibes: ["Hustle first, love later.", "Loyalty is expensive, don't expect it from cheap people.", "A lion isn't tamed, and a hustler never loses."], win: "Winning Probability:" }
        };

        let currentLang = 'sw';

        function setLang(l) {
            currentLang = l;
            document.getElementById('sw-btn').classList.toggle('active', l==='sw');
            document.getElementById('en-btn').classList.toggle('active', l==='en');
            document.getElementById('lbl-t1').innerText = ui[l].t1;
            document.getElementById('lbl-t2').innerText = ui[l].t2;
            document.getElementById('btn-txt').innerText = ui[l].btn;
            document.getElementById('res-head').innerText = ui[l].head;
        }

        function analyzeMatch() {
            const t1 = document.getElementById('team1').value;
            const t2 = document.getElementById('team2').value;
            if(!t1 || !t2) return alert("Weka timu zote!");

            const prob = Math.floor(Math.random() * (70 - 40 + 1)) + 40;
            const output = document.getElementById('prediction-output');
            const vibe = document.getElementById('vibe-output');

            output.innerHTML = `<strong>${t1}</strong> ${prob}% vs <strong>${t2}</strong> ${100-prob}%<br><br>
                                <span style="color:var(--p)">>> Recommendation: ${prob > 55 ? t1 : t2} to Win.</span>`;
            
            vibe.innerText = "Maneno ya Mtaani: " + ui[currentLang].vibes[Math.floor(Math.random()*3)];
            document.getElementById('result-box').style.display = 'block';
        }
    </script>
</body>
</html>
